name: Generate sqz.html from sqz.txt

on:
  push:
    paths:
      - 'w/sqz/sqz.txt'   # 仅当 sqz.txt 文件更新时触发
    branches:
      - main              # 如果你的默认分支是 master，改为 master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 允许工作流写入仓库
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Generate sqz.html
        run: node .github/scripts/generate.js

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add w/sqz/sqz.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-generate sqz.html from sqz.txt"
          git push
