name: Sync to profile repo (achtlv)

on:
  push:
    branches:
      - main   # 如果默认分支是 master 就改成 master

permissions:
  contents: write   # 显式声明写权限（对源仓库有用）

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo (achtlv.github.io)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout target repo (achtlv) using PAT
        uses: actions/checkout@v4
        with:
          repository: achtlv/achtlv
          path: target
          token: ${{ secrets.PROFILE_REPO_TOKEN }}   # ← 这里关键！用 PAT checkout 目标仓库
          fetch-depth: 0

      - name: Mirror files from source to target
        run: |
          rsync -av --delete --exclude='.git' --exclude='.github' ./ target/
          # ↑ 把源仓库所有文件（除 .git 和 .github）覆盖到 target 里
          # 如果你只想同步特定文件，改成：
          # cp -f README.md target/README.md
          # 或 rsync -av ./docs/ target/docs/ 等

      - name: Commit and push to target if changed
        working-directory: target
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto sync from achtlv.github.io [$(date +'%Y-%m-%d %H:%M')]"
            git push origin HEAD:main   # ← 这里用 origin，就是用 PAT 认证的 remote
          fi
