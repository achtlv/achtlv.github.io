name: Sync to profile repo (achtlv)

on:
  push:
    branches:
      - main          # 如果你的默认分支是 master，改成 master

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo (achtlv.github.io)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare and push to target repo (achtlv)
        env:
          TARGET_TOKEN: ${{ secrets.PROFILE_REPO_TOKEN }}
          TARGET_REPO: achtlv/achtlv
        run: |
          # 创建一个临时目录来操作目标仓库
          mkdir target-repo
          cd target-repo
          
          # 初始化空仓库
          git init
          
          # 添加远程，使用 PAT 认证
          git remote add origin "https://x-access-token:\( {TARGET_TOKEN}@github.com/ \){TARGET_REPO}.git"
          
          # 从源仓库复制所有文件（排除 .git 和 .github 以避免冲突）
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            ../* ./
          
          # 配置 git 用户（必须的）
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # 添加所有文件
          git add -A
          
          # 如果有变化才 commit（第一次一定是全新的）
          if git diff --staged --quiet; then
            echo "No changes, skipping commit"
          else
            git commit -m "Initial sync + auto update from achtlv.github.io ($(date +'%Y-%m-%d %H:%M'))"
            
            # 第一次 push 需要创建分支（用 -u 设置 upstream）
            # 后续 push 正常
            git push -u origin HEAD:main
          fi
