name: Sync to profile repo

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to achtlv repo
        env:
          TOKEN: ${{ secrets.PROFILE_REPO_TOKEN }}
        run: |
          mkdir temp-target
          cd temp-target
          git init
          git remote add origin https://x-access-token:$TOKEN@github.com/achtlv/achtlv.git
          rsync -av --delete --exclude=.git --exclude=.github ../* ./
          git config user.name "Actions Bot"
          git config user.email "bot@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto sync from achtlv.github.io"
          git push --force origin HEAD:main
