<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>何意味</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            font-family: sans-serif;
        }
        .huge-red-text {
            font-size: 20vw;      /* 视口宽度的20%，足够巨大且自适应 */
            font-weight: bold;
            color: red;
            text-align: center;
            line-height: 1.2;
            word-break: keep-all; /* 防止日文汉字换行 */
        }
    </style>
</head>
<body>
    <div class="huge-red-text">何意味</div>
</body>
</html>
